<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ai-telemetry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }

    :root {
      --bg:           #0a0a08;
      --surface:      #111110;
      --border:       #252522;
      --border-hi:    #3a3a36;

      /* event-type colors */
      --amber:        #E8A048;
      --amber-dim:    rgba(232,160,72,0.14);
      --amber-glow:   rgba(232,160,72,0.08);

      --lime:         #6BAF7A;
      --lime-dim:     rgba(107,175,122,0.14);
      --lime-glow:    rgba(107,175,122,0.08);

      --teal:         #5B8FA8;
      --teal-dim:     rgba(91,143,168,0.14);
      --teal-glow:    rgba(91,143,168,0.08);

      --violet:       #9B72CF;
      --violet-dim:   rgba(155,114,207,0.14);
      --violet-glow:  rgba(155,114,207,0.08);

      --emerald:      #5A8C62;   /* live dot only */
      --text-1:       #E8E4D9;
      --text-2:       #8A8680;
      --text-3:       #4A4844;
      --font:         'Martian Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      font-size: 0.75rem;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* CRT scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 1px,
        rgba(0,0,0,0.032) 1px, rgba(0,0,0,0.032) 2px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Header ───────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
    }

    .logo {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--text-1);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-prefix { color: var(--text-3); font-weight: 300; }

    .logo-cursor {
      display: inline-block;
      width: 7px;
      height: 0.85em;
      background: var(--amber);
      vertical-align: text-bottom;
      margin-left: 1px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .header-center {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.6rem;
      color: var(--text-3);
      letter-spacing: 0.06em;
    }

    .live-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--emerald);
      animation: pulse 2.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    .period-filter { display: flex; gap: 2px; }

    .period-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-3);
      font-family: var(--font);
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      padding: 4px 10px;
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
    }

    .period-btn:hover { color: var(--text-1); border-color: var(--border-hi); }

    .period-btn.active {
      background: var(--amber);
      color: var(--bg);
      font-weight: 700;
      border-color: var(--amber);
    }

    /* ── Date range picker ────────────────────────────── */
    .date-range-wrapper { position: relative; }

    .date-range-panel {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border-hi);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      z-index: 200;
      display: flex;
      flex-direction: row;
      min-width: 640px;
    }

    /* Calendar column */
    .dr-cal-col {
      padding: 16px;
      border-right: 1px solid var(--border);
      min-width: 240px;
    }

    .dr-cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .dr-cal-nav button {
      background: none;
      border: 1px solid transparent;
      color: var(--text-2);
      font-family: var(--font);
      font-size: 1.1rem;
      line-height: 1;
      padding: 2px 8px;
      cursor: pointer;
      transition: color 0.1s, border-color 0.1s;
    }

    .dr-cal-nav button:hover { color: var(--text-1); border-color: var(--border-hi); }

    #dr-month-label {
      font-size: 0.7rem;
      color: var(--text-1);
      letter-spacing: 0.05em;
    }

    .dr-cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .dr-day-hdr {
      font-size: 0.525rem;
      color: var(--text-3);
      text-align: center;
      padding: 2px 0 6px;
      letter-spacing: 0.06em;
    }

    .dr-day {
      font-size: 0.625rem;
      text-align: center;
      padding: 5px 2px;
      cursor: pointer;
      color: var(--text-1);
      border-radius: 2px;
      position: relative;
      transition: background 0.08s;
      user-select: none;
    }

    .dr-day:hover { background: var(--border-hi); }
    .dr-day.other-month { color: var(--text-3); }

    .dr-day.today::after {
      content: '';
      position: absolute;
      bottom: 2px;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--amber);
    }

    .dr-day.sel-start,
    .dr-day.sel-end {
      background: var(--amber);
      color: var(--bg);
      font-weight: 700;
    }

    .dr-day.in-range {
      background: var(--amber-dim);
      border-radius: 0;
    }

    /* Absolute time range column */
    .dr-abs-col {
      padding: 16px;
      border-right: 1px solid var(--border);
      min-width: 210px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .dr-col-title {
      font-size: 0.575rem;
      color: var(--text-3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .dr-label {
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 0.575rem;
      color: var(--text-2);
      letter-spacing: 0.06em;
    }

    .dr-label input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-1);
      font-family: var(--font);
      font-size: 0.65rem;
      padding: 6px 8px;
      outline: none;
      transition: border-color 0.12s;
    }

    .dr-label input:focus { border-color: var(--amber); }

    #dr-apply {
      background: var(--amber);
      color: var(--bg);
      border: none;
      padding: 7px 14px;
      font-family: var(--font);
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      font-weight: 700;
      cursor: pointer;
      margin-top: auto;
    }

    #dr-apply:hover:not(:disabled) { opacity: 0.85; }
    #dr-apply:disabled { opacity: 0.35; cursor: default; }

    /* Quick ranges column */
    .dr-quick-col {
      padding: 16px;
      min-width: 160px;
    }

    .dr-quick-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
      margin-top: 8px;
    }

    .dr-quick-btn {
      background: none;
      border: none;
      color: var(--text-2);
      font-family: var(--font);
      font-size: 0.65rem;
      padding: 5px 8px;
      text-align: left;
      width: 100%;
      cursor: pointer;
      transition: background 0.08s, color 0.08s;
    }

    .dr-quick-btn:hover { background: var(--amber-dim); color: var(--amber); }

    /* ── Chart selection rect ─────────────────────────── */
    #selection-rect {
      position: absolute;
      pointer-events: none;
      background: rgba(232,160,72,0.10);
      border-left: 1px solid rgba(232,160,72,0.5);
      border-right: 1px solid rgba(232,160,72,0.5);
      top: 0;
      height: 100%;
    }

    #timeline-chart { cursor: crosshair; }

    /* ── KPI Strip ────────────────────────────────────── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }

    .kpi-card {
      background: var(--bg);
      padding: 1.75rem 1.5rem 1.5rem;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: background 0.15s;
    }

    /* Color variants — left border + corner glow + value color */
    .kpi-card.c-amber   { box-shadow: inset 2px 0 0 var(--amber); }
    .kpi-card.c-amber .kpi-value { color: var(--amber); }
    .kpi-card.c-amber::before { background: radial-gradient(circle, var(--amber-glow) 0%, transparent 70%); }
    .kpi-card.c-amber:hover, .kpi-card.c-amber.kpi-selected { background: var(--amber-dim); }

    .kpi-card.c-lime    { box-shadow: inset 2px 0 0 var(--lime); }
    .kpi-card.c-lime .kpi-value { color: var(--lime); }
    .kpi-card.c-lime::before { background: radial-gradient(circle, var(--lime-glow) 0%, transparent 70%); }
    .kpi-card.c-lime:hover, .kpi-card.c-lime.kpi-selected   { background: var(--lime-dim); }

    .kpi-card.c-teal    { box-shadow: inset 2px 0 0 var(--teal); }
    .kpi-card.c-teal .kpi-value { color: var(--teal); }
    .kpi-card.c-teal::before { background: radial-gradient(circle, var(--teal-glow) 0%, transparent 70%); }
    .kpi-card.c-teal:hover, .kpi-card.c-teal.kpi-selected   { background: var(--teal-dim); }

    .kpi-card::before {
      content: '';
      position: absolute;
      top: -20px;
      left: -20px;
      width: 80px;
      height: 80px;
      pointer-events: none;
    }

    .kpi-label {
      font-size: 0.575rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 0.6rem;
    }

    .kpi-value {
      font-size: 2.6rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .kpi-sub {
      font-size: 0.575rem;
      color: var(--text-3);
      margin-top: 0.4rem;
      letter-spacing: 0.04em;
    }

    /* ── Section header ───────────────────────────────── */
    .section-header {
      font-size: 0.575rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .section-header::before {
      content: '──';
      color: var(--border-hi);
      letter-spacing: -0.1em;
    }

    /* ── Timeline ─────────────────────────────────────── */
    .timeline-section {
      padding: 1.25rem 1.5rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .chart-wrap {
      height: 400px;
      position: relative;
    }

    /* ── Three-column leaderboard ─────────────────────── */
    .three-col {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }

    .panel {
      background: var(--bg);
      padding: 1.25rem 1.5rem 1.5rem;
    }

    .panel .bar-list {
      max-height: 1040px;
      overflow-y: auto;
    }

    /* ── Bar list ─────────────────────────────────────── */
    .bar-list {
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
    }

    .bar-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 5px;
    }

    .bar-name {
      font-size: 0.7rem;
      color: var(--text-1);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 70%;
    }

    .bar-count {
      font-size: 0.6rem;
      color: var(--text-2);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .bar-track {
      height: 2px;
      background: var(--border);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0;
      transition: width 0.65s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .bar-fill.c-amber  { background: var(--amber); }
    .bar-fill.c-lime   { background: var(--lime); }
    .bar-fill.c-teal   { background: var(--teal); }
    .bar-fill.c-violet { background: var(--violet); }

    /* ── Recent feed ──────────────────────────────────── */
    .feed-section {
      padding: 1.25rem 1.5rem 1.5rem;
    }

    .feed-list {
      display: flex;
      flex-direction: column;
      max-height: 320px;
      overflow-y: auto;
    }

    .feed-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.45rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.65rem;
      animation: slide-in 0.18s ease-out both;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .event-tag {
      padding: 2px 7px;
      font-size: 0.575rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .event-tag.c-amber  { background: var(--amber-dim);  color: var(--amber); }
    .event-tag.c-lime   { background: var(--lime-dim);   color: var(--lime); }
    .event-tag.c-teal   { background: var(--teal-dim);   color: var(--teal); }
    .event-tag.c-violet { background: var(--violet-dim); color: var(--violet); }

    .feed-host    { color: var(--text-1); flex-shrink: 0; }
    .feed-sep     { color: var(--text-3); flex-shrink: 0; }
    .feed-project { color: var(--text-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
    .feed-time    { color: var(--text-3); margin-left: auto; flex-shrink: 0; font-size: 0.575rem; }

    /* ── States ───────────────────────────────────────── */
    .empty {
      color: var(--text-3);
      font-size: 0.65rem;
      padding: 1.5rem 0;
      text-align: center;
    }

    /* ── Panel search inputs ──────────────────────────── */
    .panel-search {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-1);
      font-family: var(--font);
      font-size: 0.65rem;
      padding: 5px 9px;
      margin-bottom: 1rem;
      outline: none;
      border-radius: 0;
      transition: border-color 0.12s;
    }
    .panel-search:focus { border-color: var(--amber); }
    .panel-search::placeholder { color: var(--text-3); }

    /* ── Scrollbar ────────────────────────────────────── */
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-hi); }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────── -->
<header>
  <div class="logo">
    <span class="logo-prefix">~/</span>ai-telemetry<span class="logo-cursor"></span>
  </div>

  <div class="header-center">
    <span class="live-dot"></span>
    <span>LIVE</span>
    <span style="color:var(--border-hi)">·</span>
    <span id="last-updated">—</span>
  </div>

  <div class="date-range-wrapper">
      <button class="period-btn active" id="date-range-btn" title="Change time range">Last 7 days</button>
      <div class="date-range-panel" id="date-range-panel" hidden>
        <!-- Column 1: calendar -->
        <div class="dr-cal-col">
          <div class="dr-cal-nav">
            <button id="dr-prev">&#x2039;</button>
            <span id="dr-month-label"></span>
            <button id="dr-next">&#x203a;</button>
          </div>
          <div id="dr-cal-grid" class="dr-cal-grid"></div>
        </div>
        <!-- Column 2: from/to + apply -->
        <div class="dr-abs-col">
          <div class="dr-col-title">Absolute time range</div>
          <label class="dr-label">From<input type="text" id="dr-from" readonly placeholder="—"></label>
          <label class="dr-label">To<input type="text" id="dr-to" readonly placeholder="—"></label>
          <button id="dr-apply" disabled>Apply time range</button>
        </div>
        <!-- Column 3: quick ranges -->
        <div class="dr-quick-col">
          <div class="dr-col-title">Quick ranges</div>
          <div class="dr-quick-list">
            <button class="dr-quick-btn" data-qr="today">Today</button>
            <button class="dr-quick-btn" data-qr="yesterday">Yesterday</button>
            <button class="dr-quick-btn" data-qr="7d">Last 7 days</button>
            <button class="dr-quick-btn" data-qr="14d">Last 14 days</button>
            <button class="dr-quick-btn" data-qr="30d">Last 30 days</button>
            <button class="dr-quick-btn" data-qr="90d">Last 90 days</button>
            <button class="dr-quick-btn" data-qr="month">This month</button>
            <button class="dr-quick-btn" data-qr="all">All time</button>
          </div>
        </div>
      </div>
    </div>
</header>

<!-- ── KPI Strip ──────────────────────────────────────── -->
<div class="kpi-grid">
  <div class="kpi-card c-amber">
    <div class="kpi-label">Skill Calls</div>
    <div class="kpi-value" id="kpi-invocations">—</div>
    <div class="kpi-sub">skill invocations</div>
  </div>
  <div class="kpi-card c-lime">
    <div class="kpi-label">Agent Calls</div>
    <div class="kpi-value" id="kpi-agents">—</div>
    <div class="kpi-sub">custom agent spawns</div>
  </div>
  <div class="kpi-card c-teal">
    <div class="kpi-label">MCP Calls</div>
    <div class="kpi-value" id="kpi-mcp">—</div>
    <div class="kpi-sub">MCP tool invocations</div>
  </div>
</div>

<!-- ── Timeline ───────────────────────────────────────── -->
<div class="timeline-section">
  <div class="section-header">Invocations over time</div>
  <div class="chart-wrap">
    <canvas id="timeline-chart"></canvas>
    <div id="selection-rect" hidden></div>
  </div>
</div>

<!-- ── Leaderboards ───────────────────────────────────── -->
<div class="three-col">
  <div class="panel">
    <div class="section-header">Skill Usage</div>
    <input id="skill-search" class="panel-search" type="text" placeholder="filter skills…" autocomplete="off">
    <div class="bar-list" id="skill-bars"><div class="empty">loading…</div></div>
  </div>
  <div class="panel">
    <div class="section-header">Agent Usage</div>
    <input id="agent-search" class="panel-search" type="text" placeholder="filter agents…" autocomplete="off">
    <div class="bar-list" id="agent-bars"><div class="empty">loading…</div></div>
  </div>
  <div class="panel">
    <div class="section-header">MCP Tool Usage</div>
    <input id="mcp-search" class="panel-search" type="text" placeholder="filter tools…" autocomplete="off">
    <div class="bar-list" id="mcp-bars"><div class="empty">loading…</div></div>
  </div>
</div>

<!-- ── Recent Feed ────────────────────────────────────── -->
<div class="feed-section">
  <div class="section-header">Recent events</div>
  <div class="feed-list" id="feed-list"><div class="empty">loading…</div></div>
</div>

<script>
  (() => {
    let period = '7d';
    let rangeLabel = 'Last 7 days';
    let customRange  = null;   // { from, to } ISO date strings, or null
    let lastTimeline = [];     // raw timeline rows with .date field
    let calYear    = new Date().getFullYear();
    let calMonth   = new Date().getMonth();  // 0-indexed
    let calSelFrom = null;   // 'YYYY-MM-DD'
    let calSelTo   = null;   // 'YYYY-MM-DD'
    let chart  = null;
    let lastUpdated = 0;
    let refreshTimer = null;
    let allSkills = [];
    let allAgents = [];
    let allMcp    = [];
    let selectedDatasetIdx = null;

    // color map keyed by event_type
    const COLOR = {
      skill: { css: 'c-amber', hex: '#E8A048' },
      agent: { css: 'c-lime',  hex: '#6BAF7A' },
      mcp:   { css: 'c-teal',  hex: '#5B8FA8' },
    };

    // ── Boot ────────────────────────────────────────────
    document.fonts.ready.then(() => {
      document.getElementById('skill-search').addEventListener('input', applySkillFilter);
      document.getElementById('agent-search').addEventListener('input', applyAgentFilter);
      document.getElementById('mcp-search').addEventListener('input', applyMcpFilter);

      const kpiCards = document.querySelectorAll('.kpi-grid .kpi-card');
      kpiCards.forEach((card, i) => {
        card.addEventListener('click', () => {
          if (!chart) return;
          if (selectedDatasetIdx === i) {
            selectedDatasetIdx = null;
            chart.data.datasets.forEach(ds => { ds.hidden = false; });
            kpiCards.forEach(c => c.classList.remove('kpi-selected'));
          } else {
            selectedDatasetIdx = i;
            chart.data.datasets.forEach((ds, j) => { ds.hidden = (j !== i); });
            kpiCards.forEach(c => c.classList.remove('kpi-selected'));
            card.classList.add('kpi-selected');
          }
          chart.update();
        });
      });

      load();
      setInterval(tickTicker, 4000);

      // ── Date range picker ────────────────────────────────
      const drBtn   = document.getElementById('date-range-btn');
      const drPanel = document.getElementById('date-range-panel');

      drBtn.addEventListener('click', e => {
        e.stopPropagation();
        const opening = drPanel.hidden;
        drPanel.hidden = !drPanel.hidden;
        if (opening) renderCal();
      });

      document.addEventListener('click', () => { drPanel.hidden = true; });
      drPanel.addEventListener('click', e => e.stopPropagation());

      document.getElementById('dr-prev').addEventListener('click', () => {
        calMonth--;
        if (calMonth < 0) { calMonth = 11; calYear--; }
        renderCal();
      });

      document.getElementById('dr-next').addEventListener('click', () => {
        calMonth++;
        if (calMonth > 11) { calMonth = 0; calYear++; }
        renderCal();
      });

      document.getElementById('dr-apply').addEventListener('click', () => {
        if (!calSelFrom || !calSelTo) return;
        drPanel.hidden = true;
        applyCustomRange(calSelFrom, calSelTo);
      });

      document.querySelectorAll('.dr-quick-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          drPanel.hidden = true;
          quickRange(btn.dataset.qr);
        });
      });

      // ── Chart drag-to-select ─────────────────────────────
      let isDragging = false;
      let dragStartX = null;
      const canvas  = document.getElementById('timeline-chart');
      const selRect = document.getElementById('selection-rect');

      canvas.addEventListener('mousedown', e => {
        if (!chart || !lastTimeline.length) return;
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        if (x < chart.chartArea.left || x > chart.chartArea.right) return;
        isDragging = true;
        dragStartX = x;
        selRect.style.left   = `${x}px`;
        selRect.style.top    = `${chart.chartArea.top}px`;
        selRect.style.height = `${chart.chartArea.bottom - chart.chartArea.top}px`;
        selRect.style.width  = '0';
        selRect.hidden = false;
      });

      canvas.addEventListener('mousemove', e => {
        if (!isDragging) return;
        const rect = canvas.getBoundingClientRect();
        const x = Math.max(chart.chartArea.left,
                           Math.min(chart.chartArea.right, e.clientX - rect.left));
        selRect.style.left  = `${Math.min(dragStartX, x)}px`;
        selRect.style.width = `${Math.abs(x - dragStartX)}px`;
      });

      document.addEventListener('mouseup', e => {
        if (!isDragging) return;
        isDragging = false;
        selRect.hidden = true;
        const rect = canvas.getBoundingClientRect();
        const endX = e.clientX - rect.left;
        const clamp = v => Math.max(chart.chartArea.left, Math.min(chart.chartArea.right, v));
        let i0 = Math.round(chart.scales.x.getValueForPixel(clamp(Math.min(dragStartX, endX))));
        let i1 = Math.round(chart.scales.x.getValueForPixel(clamp(Math.max(dragStartX, endX))));
        i0 = Math.max(0, Math.min(lastTimeline.length - 1, i0));
        i1 = Math.max(0, Math.min(lastTimeline.length - 1, i1));
        if (i0 >= i1) return;
        applyCustomRange(lastTimeline[i0].date, lastTimeline[i1].date);
      });
    });

    // ── Date range helpers ───────────────────────────────
    function fmtDate(iso) {
      return new Date(iso + 'T12:00:00Z')
        .toLocaleDateString('en', { month: 'short', day: 'numeric' });
    }

    function applyCustomRange(from, to, label) {
      customRange = { from, to };
      period = null;
      rangeLabel = label || `${fmtDate(from)} – ${fmtDate(to)}`;
      document.getElementById('date-range-btn').textContent = rangeLabel;
      load();
    }

    // ── Calendar ─────────────────────────────────────────
    function isoDate(y, m, d) {
      return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    }

    function renderCal() {
      const todayIso = new Date().toISOString().slice(0, 10);
      const label = new Date(calYear, calMonth, 1)
        .toLocaleDateString('en', { month: 'long', year: 'numeric' });
      document.getElementById('dr-month-label').textContent = label;

      const DAY_HDRS = ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'];
      let html = DAY_HDRS.map(d => `<div class="dr-day-hdr">${d}</div>`).join('');

      const firstDow  = new Date(calYear, calMonth, 1).getDay();
      const daysInMon = new Date(calYear, calMonth + 1, 0).getDate();
      const prevDays  = new Date(calYear, calMonth, 0).getDate();

      // Prev-month fill
      for (let i = firstDow - 1; i >= 0; i--) {
        const d = prevDays - i;
        const m = calMonth === 0 ? 11 : calMonth - 1;
        const y = calMonth === 0 ? calYear - 1 : calYear;
        html += dayCell(isoDate(y, m, d), d, true, todayIso);
      }

      // Current month
      for (let d = 1; d <= daysInMon; d++) {
        html += dayCell(isoDate(calYear, calMonth, d), d, false, todayIso);
      }

      // Next-month fill
      const total = Math.ceil((firstDow + daysInMon) / 7) * 7;
      let nd = 1;
      for (let i = firstDow + daysInMon; i < total; i++, nd++) {
        const m = calMonth === 11 ? 0 : calMonth + 1;
        const y = calMonth === 11 ? calYear + 1 : calYear;
        html += dayCell(isoDate(y, m, nd), nd, true, todayIso);
      }

      const grid = document.getElementById('dr-cal-grid');
      grid.innerHTML = html;
      grid.querySelectorAll('.dr-day[data-iso]').forEach(cell => {
        cell.addEventListener('click', () => onCalDayClick(cell.dataset.iso));
      });
    }

    function dayCell(iso, num, otherMonth, todayIso) {
      const cls = ['dr-day'];
      if (otherMonth) cls.push('other-month');
      if (iso === todayIso) cls.push('today');
      if (calSelFrom && calSelTo) {
        if (iso === calSelFrom) cls.push('sel-start');
        else if (iso === calSelTo) cls.push('sel-end');
        else if (iso > calSelFrom && iso < calSelTo) cls.push('in-range');
      } else if (iso === calSelFrom) {
        cls.push('sel-start');
      }
      return `<div class="${cls.join(' ')}" data-iso="${iso}">${num}</div>`;
    }

    function onCalDayClick(iso) {
      if (!calSelFrom || calSelTo) {
        calSelFrom = iso;
        calSelTo = null;
      } else {
        if (iso >= calSelFrom) {
          calSelTo = iso;
        } else {
          calSelFrom = iso;
          calSelTo = null;
        }
      }
      document.getElementById('dr-from').value = calSelFrom || '';
      document.getElementById('dr-to').value   = calSelTo || '';
      document.getElementById('dr-apply').disabled = !(calSelFrom && calSelTo);
      renderCal();
    }

    const QUICK_LABELS = {
      today: 'Today', yesterday: 'Yesterday',
      '7d': 'Last 7 days', '14d': 'Last 14 days',
      '30d': 'Last 30 days', '90d': 'Last 90 days',
      month: 'This month', all: 'All time',
    };

    function quickRange(key) {
      const now = new Date();
      // Use local date components to avoid UTC timezone shift
      const isoLocal = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const shift = n => { const d = new Date(now); d.setDate(d.getDate() + n); return d; };
      const todayIso = isoLocal(now);
      let from, to = todayIso;
      switch (key) {
        case 'today':     from = todayIso; break;
        case 'yesterday': { const y = shift(-1); from = to = isoLocal(y); break; }
        case '7d':        from = isoLocal(shift(-6));  break;
        case '14d':       from = isoLocal(shift(-13)); break;
        case '30d':       from = isoLocal(shift(-29)); break;
        case '90d':       from = isoLocal(shift(-89)); break;
        case 'month':     from = isoLocal(new Date(now.getFullYear(), now.getMonth(), 1)); break;
        case 'all':       from = '2020-01-01'; break;
        default:          return;
      }
      // Sync calendar state so it reflects the selection when panel reopens
      calSelFrom = from;
      calSelTo   = to;
      const toDate = new Date(to + 'T12:00:00');
      calYear  = toDate.getFullYear();
      calMonth = toDate.getMonth();
      document.getElementById('dr-from').value = from;
      document.getElementById('dr-to').value   = to;
      document.getElementById('dr-apply').disabled = false;
      applyCustomRange(from, to, QUICK_LABELS[key]);
    }

    // ── Ticker ───────────────────────────────────────────
    function tickTicker() {
      if (!lastUpdated) return;
      const sec = Math.round((Date.now() - lastUpdated) / 1000);
      const el = document.getElementById('last-updated');
      if (!el) return;
      el.textContent = sec < 5 ? 'just now' : `${sec}s ago`;
    }

    // ── Fetch ────────────────────────────────────────────
    async function load() {
      clearTimeout(refreshTimer);
      try {
        const apiUrl = customRange
          ? `/api/stats?from=${customRange.from}&to=${customRange.to}`
          : `/api/stats?period=${period}`;
        const res = await fetch(apiUrl);
        if (!res.ok) throw new Error(res.status);
        const data = await res.json();
        lastUpdated = Date.now();
        tickTicker();
        render(data);
      } catch (e) {
        console.error('[ai-telemetry] fetch failed:', e);
      }
      refreshTimer = setTimeout(load, 30_000);
    }

    // ── Render ───────────────────────────────────────────
    function render(data) {
      const skillTotal = (data.skills || []).reduce((s, r) => s + r.count, 0);
      const agentTotal = (data.agents || []).reduce((s, r) => s + r.count, 0);
      const mcpTotal   = (data.mcp    || []).reduce((s, r) => s + r.count, 0);
      countUp('kpi-invocations', skillTotal);
      countUp('kpi-agents',      agentTotal);
      countUp('kpi-mcp',         mcpTotal);
      renderChart(data.timeline || []);
      allSkills = data.skills  || [];
      allAgents = data.agents  || [];
      allMcp    = data.mcp     || [];
      applySkillFilter();
      applyAgentFilter();
      applyMcpFilter();
      renderFeed(data.recent || []);
    }

    // ── Filters ───────────────────────────────────────────
    function applySkillFilter() {
      const q = (document.getElementById('skill-search')?.value || '').toLowerCase();
      const filtered = q ? allSkills.filter(s => s.skill.toLowerCase().includes(q)) : allSkills;
      renderBars('skill-bars', filtered, 'skill', 'c-amber');
    }

    function applyAgentFilter() {
      const q = (document.getElementById('agent-search')?.value || '').toLowerCase();
      const filtered = q ? allAgents.filter(a => a.name.toLowerCase().includes(q)) : allAgents;
      renderBars('agent-bars', filtered, 'name', 'c-lime');
    }

    function applyMcpFilter() {
      const q = (document.getElementById('mcp-search')?.value || '').toLowerCase();
      const filtered = q ? allMcp.filter(m => m.name.toLowerCase().includes(q)) : allMcp;
      renderBars('mcp-bars', filtered, 'name', 'c-teal');
    }

    // ── Count-up animation ───────────────────────────────
    function countUp(id, target) {
      const el = document.getElementById(id);
      if (!el) return;
      const start = performance.now();
      const dur = 550;
      (function step(now) {
        const t = Math.min((now - start) / dur, 1);
        const ease = 1 - Math.pow(1 - t, 3);
        el.textContent = Math.round(target * ease).toLocaleString();
        if (t < 1) requestAnimationFrame(step);
      })(start);
    }

    // ── Timeline chart (4 datasets) ───────────────────────
    function renderChart(timeline) {
      lastTimeline = timeline;
      const labels  = timeline.map(d => {
        const dt = new Date(d.date + 'T12:00:00Z');
        return dt.toLocaleDateString('en', { month: 'short', day: 'numeric' });
      });

      const datasets = [
        { label: 'Skills',  key: 'skills', color: COLOR.skill.hex },
        { label: 'Agents',  key: 'agents', color: COLOR.agent.hex },
        { label: 'MCP',     key: 'mcp',    color: COLOR.mcp.hex   },
      ].map(({ label, key, color }) => ({
        label,
        data: timeline.map(d => d[key] ?? 0),
        borderColor: color,
        borderWidth: 1.5,
        pointRadius: 3,
        pointHoverRadius: 5,
        pointHoverBackgroundColor: color,
        pointHoverBorderColor: '#0a0a08',
        pointHoverBorderWidth: 2,
        fill: false,
        tension: 0.35,
      }));

      const monoFont = { family: "'Martian Mono', monospace", size: 9 };

      if (chart) {
        chart.data.labels = labels;
        chart.data.datasets.forEach((ds, i) => { ds.data = datasets[i].data; });
        chart.update('active');
        return;
      }

      chart = new Chart(document.getElementById('timeline-chart'), {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          animation: { duration: 400 },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#111110',
              borderColor: '#3a3a36',
              borderWidth: 1,
              titleColor: '#4A4844',
              bodyColor: '#E8E4D9',
              padding: { x: 10, y: 8 },
              cornerRadius: 0,
              displayColors: true,
              boxWidth: 8,
              boxHeight: 8,
              titleFont: monoFont,
              bodyFont: { family: "'Martian Mono', monospace", size: 10 },
            },
          },
          scales: {
            x: {
              grid: { color: '#252522', drawBorder: false },
              ticks: { color: '#4A4844', font: monoFont, maxTicksLimit: 10, maxRotation: 0 },
              border: { display: false },
            },
            y: {
              grid: { color: '#252522', drawBorder: false },
              ticks: { color: '#4A4844', font: monoFont, maxTicksLimit: 5, precision: 0 },
              border: { display: false },
              beginAtZero: true,
            },
          },
        },
      });
    }

    // ── Horizontal bars ───────────────────────────────────
    function renderBars(containerId, items, nameKey, colorClass) {
      const el = document.getElementById(containerId);
      if (!el) return;

      const emptyMsg = {
        'agent-bars': 'no custom agents recorded yet',
        'mcp-bars':   'no MCP calls recorded yet',
      }[containerId] || 'no data for this period';

      if (!items || !items.length) {
        el.innerHTML = `<div class="empty">${emptyMsg}</div>`;
        return;
      }

      el.innerHTML = items.slice(0, 15).map(item => `
        <div>
          <div class="bar-row">
            <span class="bar-name">${esc(item[nameKey])}</span>
            <span class="bar-count">${item.count.toLocaleString()}</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill ${colorClass}" data-pct="${item.pct || 0}" style="width:0"></div>
          </div>
        </div>
      `).join('');

      requestAnimationFrame(() => requestAnimationFrame(() => {
        el.querySelectorAll('.bar-fill').forEach(b => { b.style.width = b.dataset.pct + '%'; });
      }));
    }

    // ── Event feed ────────────────────────────────────────
    function renderFeed(events) {
      const el = document.getElementById('feed-list');
      if (!el) return;

      if (!events || !events.length) {
        el.innerHTML = '<div class="empty">no events yet</div>';
        return;
      }

      const LABEL = { skill: 'SKILL', agent: 'AGENT', mcp: 'MCP' };

      el.innerHTML = events.map((e, i) => {
        const type   = e.event_type || 'skill';
        const clr    = COLOR[type]?.css || 'c-amber';
        const label  = LABEL[type] || type.toUpperCase();
        return `
          <div class="feed-item" style="animation-delay:${i * 18}ms">
            <span class="event-tag ${clr}">${label}</span>
            <span class="bar-name" style="max-width:none;color:var(--text-1)">${esc(e.name)}</span>
            <span class="feed-sep">·</span>
            <span class="feed-project">${esc(e.project)}</span>
            <span class="feed-time">${timeAgo(e.timestamp)}</span>
          </div>`;
      }).join('');
    }

    // ── Helpers ───────────────────────────────────────────
    function timeAgo(ts) {
      const sec = Math.round((Date.now() - new Date(ts).getTime()) / 1000);
      if (sec < 60)    return `${sec}s ago`;
      if (sec < 3600)  return `${Math.floor(sec / 60)}m ago`;
      if (sec < 86400) return `${Math.floor(sec / 3600)}h ago`;
      return `${Math.floor(sec / 86400)}d ago`;
    }

    function esc(s) {
      return String(s ?? '—')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }
  })();
</script>
</body>
</html>
